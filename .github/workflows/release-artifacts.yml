name: release-artifacts

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve and validate version
        id: version
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          VERSION="$(bun -e "import pkg from './package.json' with { type: 'json' }; console.log(pkg.version)")"
          if [[ "v${VERSION}" != "${TAG}" ]]; then
            echo "Release tag ${TAG} does not match package.json version v${VERSION}" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build optimized binaries
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist/release

          bun build --compile --minify --bytecode src/cli.ts --target=bun-darwin-arm64 --outfile "dist/release/cook-v${VERSION}-darwin-arm64"
          bun build --compile --minify --bytecode src/cli.ts --target=bun-darwin-x64 --outfile "dist/release/cook-v${VERSION}-darwin-x64"
          bun build --compile --minify --bytecode src/cli.ts --target=bun-linux-x64 --outfile "dist/release/cook-v${VERSION}-linux-x64"

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist/release
          sha256sum * > SHA256SUMS.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          fail_on_unmatched_files: true
          files: |
            dist/release/cook-v${{ steps.version.outputs.version }}-darwin-arm64
            dist/release/cook-v${{ steps.version.outputs.version }}-darwin-x64
            dist/release/cook-v${{ steps.version.outputs.version }}-linux-x64
            dist/release/SHA256SUMS.txt
